{% extends "learning_logs/base.html" %}
{% load bootstrap4 %}
{% block page_header %}
  <h1>Edit entry:</h1>
{% endblock page_header %}


{% block content %}

  <h4>
    <a href="{% url 'learning_logs:topic' topic_id=entry.topic.id %}">
      {{ entry.topic }}
    </a>
  </h4>
  
  <form action="{% url 'learning_logs:edit_entry' entry_id=entry.id %}" 
    method='post' class="from">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
      <button name='submit' class="btn btn-primary">Save changes</button>
    {% endbuttons %}
  </form>

{% endblock content %}
